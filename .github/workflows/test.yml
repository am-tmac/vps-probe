name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security-regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pytest websockets==10.4
      - run: python -m pytest -q
      - run: python tests/integration_smoke.py
      - run: bash -n install.sh
      - run: python -m py_compile panel.py ws_hub.py agent/vps-probe-agent.py validate_config.py tests/*.py
      - run: python -m json.tool config.example.json >/dev/null
